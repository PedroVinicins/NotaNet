<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador de Pastas e Notas</title>
  <style>
    /* Estilos básicos */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    #sidebar, #listnotas, #notes-container {
      background-color: #1C1C1E;
      color: white;
      padding: 10px;
      border-radius: 8px;
      width: 200px;
      min-height: 300px;
      overflow-y: auto;
    }

    .folder, .suasNotasSalvas, .container {
      margin-bottom: 10px;
      padding: 10px;
      background-color: #2C2C2E;
      border-radius: 5px;
      cursor: pointer;
    }

    h1, h2 {
      margin: 0;
      font-size: 16px;
    }

    textarea {
      width: 100%;
      height: 60px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      padding: 5px;
    }

    button {
      padding: 5px 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .apagaTudo {
      background-color: red;
    }
  </style>
</head>
<body>
  <!-- Sidebar e botões -->
  <div>
    <button id="addFolderBtn">Adicionar Pasta</button>
    <button class="apagaTudo">Apagar Tudo</button>
  </div>

  <!-- Contêineres principais -->
  <div id="sidebar">Sidebar</div>
  <div id="listnotas">Lista de Notas</div>
  <div id="notes-container">Conteúdo das Notas</div>

  <script>
    const addFolderBtn = document.getElementById('addFolderBtn');
    const sidebar = document.getElementById('sidebar');
    const listnotas = document.getElementById('listnotas');
    const notas = document.getElementById('notes-container');
    const apagaTudoBtn = document.querySelector('.apagaTudo');

    // Função para criar a pasta
    function createFolderElement(sectionTitle) {
        const folderItem = document.createElement('div');
        folderItem.classList.add('folder');
        folderItem.innerHTML = `
            <i class='bx bx-folder'></i>
            <h1 contenteditable="true" class="note-nameF">${sectionTitle}</h1>
        `;
        return folderItem;
    }

    // Função para criar uma nota na lista lateral
    function createNoteElement(item) {
        const noteItem = document.createElement('div');
        noteItem.classList.add('suasNotasSalvas');
        noteItem.innerHTML = `
          <div class="notasSalvas">
              <h1 contenteditable="true" class="note-name">${item.name}</h1>
              <p class="note-date">${item.date}</p>
          </div>
        `;
        return noteItem;
    }

    // Função para criar uma nota com conteúdo editável
    function createNoteContent(item = { name: "Nova Nota" }) {
        const noteContainer = document.createElement('div');
        noteContainer.classList.add('container');
        noteContainer.innerHTML = `
          <div class="note-content">
              <h2 contenteditable="true" class="note-title">${item.name}</h2>
              <textarea placeholder="Escreva sua nota aqui..."></textarea>
          </div>
        `;
        return noteContainer;
    }

    // Função principal: adicionar uma nova pasta
    function addFolder(sectionTitle = "Nova Pasta") {
        // Cria a pasta na sidebar
        const folder = createFolderElement(sectionTitle);
        sidebar.appendChild(folder);

        // Cria uma nota na lista lateral
        const noteData = { name: sectionTitle, date: new Date().toLocaleString() };
        const noteItem = createNoteElement(noteData);
        listnotas.appendChild(noteItem);

        // Cria o conteúdo da nota no contêiner de notas
        const noteContent = createNoteContent(noteData);
        notas.appendChild(noteContent);
    }

    // Evento: Adicionar pasta
    addFolderBtn.addEventListener('click', () => {
        const folderName = prompt("Digite o nome da nova pasta:");
        if (folderName && folderName.trim()) {
            addFolder(folderName.trim());
        } else {
            alert("Nome da pasta inválido.");
        }
    });

    // Evento: Apagar tudo
    apagaTudoBtn.addEventListener('click', () => {
        const confirmDelete = confirm("Tem certeza de que deseja apagar tudo?");
        if (confirmDelete) {
            sidebar.innerHTML = ""; // Limpa sidebar
            listnotas.innerHTML = ""; // Limpa lista de notas
            notas.innerHTML = ""; // Limpa o conteúdo das notas
            location.reload(); // Recarrega a página
        }
    });
  </script>
</body>
</html>
