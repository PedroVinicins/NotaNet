<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/public/css/header.css">
  <link rel="stylesheet" href="/public/css/style.css">
  <link rel="stylesheet" media="(max-width: 600px)" href="/public/css/screen-view.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="/public/css/sidebar.css">
  <link rel="shortcut icon" href="/image.png" sizes="16x19" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotaNet</title>
</head>

<body>


  <nav id="sidebar">
    <div id="sidebar_content">

      <div id="user">
        <img src="/image.png" id="user_avatar" alt="Avatar">

        <p id="user_infos">
          <span class="item-description">
            Usuario Notes
          </span>
          <span class="item-description">
            Bem Vindo !!!
          </span>
        </p>
      </div>

      <ul id="side_items">
        <li class="side-item active">
          <a href="#">
            <i class='bx bxs-home-smile'></i>
            <span class="item-description">
              Home launcher
            </span>
          </a>
        </li>


        <ul id="side_items">
          <li class="side-item">
            <a href="#">
              <span class="item-description">
                <label class="switch">
                  <span class="sun"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                      <g fill="#ffd43b">
                        <circle r="5" cy="12" cx="12"></circle>
                        <path
                          d="m21 13h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm-17 0h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm13.66-5.66a1 1 0 0 1 -.66-.29 1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.41l-.71.71a1 1 0 0 1 -.75.29zm-12.02 12.02a1 1 0 0 1 -.71-.29 1 1 0 0 1 0-1.41l.71-.66a1 1 0 0 1 1.41 1.41l-.71.71a1 1 0 0 1 -.7.24zm6.36-14.36a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm0 17a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm-5.66-14.66a1 1 0 0 1 -.7-.29l-.71-.71a1 1 0 0 1 1.41-1.41l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.29zm12.02 12.02a1 1 0 0 1 -.7-.29l-.66-.71a1 1 0 0 1 1.36-1.36l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.24z">
                        </path>
                      </g>
                    </svg></span>
                  <span class="moon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                      <path
                        d="m223.5 32c-123.5 0-223.5 100.3-223.5 224s100 224 223.5 224c60.6 0 115.5-24.2 155.8-63.4 5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6-96.9 0-175.5-78.8-175.5-176 0-65.8 36-123.1 89.3-153.3 6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z">
                      </path>
                    </svg></span>
                  <input type="checkbox" class="input" id="theme-toggle" aria-label="Alternar tema">
                  <span class="slider"></span>
                </label>
              </span>
              <i class='bx bxs-moon'></i>  
            </a>
          </li>

        <li class="side-item">
          <a href="https://github.com/PedroVinicins/NotaNet">
            <i class='bx bxl-github'></i>
            <span class="item-description">
              Repositório
            </span>
          </a>
        </li>

        <li class="side-item">
          <a href="#">
            <i class='bx bxs-bell-ring'></i>
            <span class="item-description">
              Notificações
            </span>
          </a>
        </li>

        <li class="side-item" id="resetbtn">
          <a href="#">
            <i class='bx bx-reset'></i>
            <span class="item-description">
              Reset
            </span>
          </a>
        </li>

        <li class="side-item">
          <a href="#">
            <i class='bx bx-help-circle'></i>
            <span class="item-description">
              HELP??
            </span>
          </a>
        </li>
      </ul>

      <button id="open_btn">
        <i  id="open_btn_icon" class='bx bxs-right-arrow'></i>
      </button>
    </div>
  </nav>

  <main>

    <header class="header">
      <h1>Nota<span>Net.</span></h1>
      <ul>

        <a class="noteAl">
          <svg viewBox="0 0 448 512" class="bell">
            <path
              d="M224 0c-17.7 0-32 14.3-32 32V49.9C119.5 61.4 64 124.2 64 200v33.4c0 45.4-15.5 89.5-43.8 124.9L5.3 377c-5.8 7.2-6.9 17.1-2.9 25.4S14.8 416 24 416H424c9.2 0 17.6-5.3 21.6-13.6s2.9-18.2-2.9-25.4l-14.9-18.6C399.5 322.9 384 278.8 384 233.4V200c0-75.8-55.5-138.6-128-150.1V32c0-17.7-14.3-32-32-32zm0 96h8c57.4 0 104 46.6 104 104v33.4c0 47.9 13.9 94.6 39.7 134.6H72.3C98.1 328 112 281.3 112 233.4V200c0-57.4 46.6-104 104-104h8zm64 352H224 160c0 17 6.7 33.3 18.7 45.3s28.3 18.7 45.3 18.7s33.3-6.7 45.3-18.7s18.7-28.3 18.7-45.3z">
            </path>
          </svg>
        </a>
      </ul>
    </header>


    
    <div class="addNote-content2">
      <div class="icon-plus"><i class='bx bx-edit-alt'></i></div>
    </div>

    <div class="container"></div>
    <div class="content">
      <div class="note">
        <h2 id="note-name"></h2>
        <p id="note-date"></p>
      </div>
    </div>

    <section>

      <a href="#">
        <span class="item-description">
          <label class="switch">
            <span class="sun"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g fill="#ffd43b">
                  <circle r="5" cy="12" cx="12"></circle>
                  <path
                    d="m21 13h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm-17 0h-1a1 1 0 0 1 0-2h1a1 1 0 0 1 0 2zm13.66-5.66a1 1 0 0 1 -.66-.29 1 1 0 0 1 0-1.41l.71-.71a1 1 0 1 1 1.41 1.41l-.71.71a1 1 0 0 1 -.75.29zm-12.02 12.02a1 1 0 0 1 -.71-.29 1 1 0 0 1 0-1.41l.71-.66a1 1 0 0 1 1.41 1.41l-.71.71a1 1 0 0 1 -.7.24zm6.36-14.36a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm0 17a1 1 0 0 1 -1-1v-1a1 1 0 0 1 2 0v1a1 1 0 0 1 -1 1zm-5.66-14.66a1 1 0 0 1 -.7-.29l-.71-.71a1 1 0 0 1 1.41-1.41l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.29zm12.02 12.02a1 1 0 0 1 -.7-.29l-.66-.71a1 1 0 0 1 1.36-1.36l.71.71a1 1 0 0 1 0 1.41 1 1 0 0 1 -.71.24z">
                  </path>
                </g>
              </svg></span>
            <span class="moon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 512">
                <path
                  d="m223.5 32c-123.5 0-223.5 100.3-223.5 224s100 224 223.5 224c60.6 0 115.5-24.2 155.8-63.4 5-4.9 6.3-12.5 3.1-18.7s-10.1-9.7-17-8.5c-9.8 1.7-19.8 2.6-30.1 2.6-96.9 0-175.5-78.8-175.5-176 0-65.8 36-123.1 89.3-153.3 6.1-3.5 9.2-10.5 7.7-17.3s-7.3-11.9-14.3-12.5c-6.3-.5-12.6-.8-19-.8z">
                </path>
              </svg></span>
            <input type="checkbox" class="input" id="theme-toggle1" aria-label="Alternar tema">
            <span class="slider"></span>
          </label>
        </span>
      </a>
    </li>

      <label title="home" for="home" class="label">
        <input id="home" name="page" type="radio" checked="" />
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 21 20"
          height="20"
          width="21"
          class="icon home"
        >
          <path
            fill="inherit"
            d="M18.9999 6.01002L12.4499 0.770018C11.1699 -0.249982 9.16988 -0.259982 7.89988 0.760018L1.34988 6.01002C0.409885 6.76002 -0.160115 8.26002 0.0398848 9.44002L1.29988 16.98C1.58988 18.67 3.15988 20 4.86988 20H15.4699C17.1599 20 18.7599 18.64 19.0499 16.97L20.3099 9.43002C20.4899 8.26002 19.9199 6.76002 18.9999 6.01002ZM10.9199 16C10.9199 16.41 10.5799 16.75 10.1699 16.75C9.75988 16.75 9.41988 16.41 9.41988 16V13C9.41988 12.59 9.75988 12.25 10.1699 12.25C10.5799 12.25 10.9199 12.59 10.9199 13V16Z"
          ></path>
        </svg>
      </label>
      <label title="favorite" for="favorite" class="label">
        <input id="favorite" name="page" type="radio" />
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="inherit"
          viewBox="0 0 20 18"
          height="18"
          width="20"
          class="icon favorite"
        >
          <path
            fill="inherit"
            d="M14.44 0C12.63 0 11.01 0.88 10 2.23C9.48413 1.53881 8.81426 0.977391 8.04353 0.590295C7.27281 0.203198 6.42247 0.00108555 5.56 0C2.49 0 0 2.5 0 5.59C0 6.78 0.19 7.88 0.52 8.9C2.1 13.9 6.97 16.89 9.38 17.71C9.72 17.83 10.28 17.83 10.62 17.71C13.03 16.89 17.9 13.9 19.48 8.9C19.81 7.88 20 6.78 20 5.59C20 2.5 17.51 0 14.44 0Z"
          ></path>
        </svg>
      </label>

    <label for="addNotas" class="label">
      <div class="addNote-content">
        <div class="icon-plus"><i class='bx bx-edit-alt'></i></div>
      </div>
    </label>

    </section>
  </main>




  <script src="/public/js/script.js"></script>

  <script>
    document.getElementById('open_btn').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('open-sidebar');
    });
  </script>
</body>

</html>
